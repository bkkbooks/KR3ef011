body:
  text: 卷上十干甲乙丙丁戊己庚辛壬癸臟腑配合甲膽手少陽乙肝手厥陰東方木也丙小腸手太陽丁心手少陰南方火也庚大腸手陽明辛肺手太陰西方金也壬膀胱足太陽癸腎足太陰北方水也戊胃足陽明己脾足太陰中央土也凡先言者為剛為陽為兄為腑主於表後言者為柔為陰為妹為臟主於裡也十二支寅卯辰巳午未申酉戌亥子醜臟腑經絡配合寅三焦手少陽卯大腸手陽明辰小腸手太陽巳包絡手厥陰午心手少陰未肺手太陰申膽足少陽酉胃足陽明戌膀胱足太陽亥肝足厥陰子腎足少陰醜脾足太陰手足三陰三陽者十二經絡之名也手足經絡配天地四時寅卯辰手三陽天陽春也巳午未手三陰天陰夏也申酉戌足三陽地陽秋也亥子醜足三陰地陰冬也合主表裡合音甘入聲余不音者並如字太陽少陰合陽明太陰合少陽厥陰合足與足合手與手合如足太陽膀胱水合足陰腎水陽為腑屬表陰為臟屬裡陰陽臟腑肝與膽厥陰風木也心與小腸少陰君火暑熱也包絡及三焦少陽相火也此為陽之臟腑脾與胃太陰濕土也肺與大腸陽明燥金也腎與膀胱太陽寒水也此為陰之臟腑脾心肝肺腎兼包絡一名命門為六臟胃小腸膽大腸膀胱兼三焦為六腑經絡病證絡者正經脈道之旁小絡如支絡孫絡之類也皆運行氣血之脈也各宗於本經焉手太陰肺病則肺脹滿膨膨而喘咳缺盆中痛咳喘上氣喘喝煩心胸滿臑臂內前廉痛甚則交兩手而瞀肩背痛而汗出虛則氣不能報息小便數變十二經始於肺經故其序如此喝乙介切廝聲也缺盆者肩前臑內陷中也臑音如從肩至肘通名曰臑自手至腕通名曰臂廉猶畔也瞀音莫眼黑也昏也言氣亂兩手相交而昏瞀也不能報息俗所云氣少不能接續也數音朔頻也手陽明大腸病則齒痛䪼腫虛則目黃口乾鼽衄喉痹腹中雷鳴氣常沖胸喘不能久立肩前臑痛大指次指不能為用䪼音拙面秀骨目下起骨也鼽音求清涕也衄音濃入聲鼻出血也不能為用言屈伸不能如意也足陽明胃經病則灑灑振寒善伸數欠或惡人與火聞木聲則惕然而驚心欲動獨閉戶牖而處欲上高而歌棄衣而走賁向腹脹罵詈不避親疏氣盛則身前皆熱消穀善飢尿色黃氣虛則身前皆寒栗胃中寒則腹脹滿實胃脘當心而痛上支兩脅膈咽不通食飲不下狂瘧溫淫汗出鼽衄口喎唇疹頸腫喉痹腹水腫脹膝臏腫痛循胸旁過乳沖股伏兔䯒外廉足胕上皆痛中指不能動振動搖也善伸自然能也數欠頻呵欠也心欲動不寧也閉戶為惡人兼多驚賁音奔勇猛也向向同熱聚也栗戰憚也支持也固也淫亂也臏音牝膝骨也股腿髀肉伏兔膝上起肉也䯒戶當切乃脛骨也跗音夫足面動脈也足太陰脾經病則舌本強食則嘔腹脹溏泄瘕水閉飲發中滿食減善噫身體皆重得後與氣快然而衰甚則肌肉痿足不收行善契腳下痛四肢不舉大小便不痛虛則腹滿腸鳴飧泄食不化舌本痛體不能動搖食不下煩心心下急痛寒瘧溏泄水閉黃疸不能臥股膝內腫厥大指不用本舌根也強去聲不和柔也溏大便稀薄瘕音假肚中結病也水閉言水不宣通也噫衣介切轉氣也後與氣言下氣也痿於為切痹病也契合也行則不覺腳相揩也飧音孫食也厥其也不能運用也手少陰心經病則胸中痛脅支滿脅下痛膺背肩胛間痛兩臂內痛甚則嗌乾心痛渴而欲飲身熱膚痛煩心譫妄虛則善悲時眩僕胸腹大脅下與腰背相引而痛目黃脅痛臑後廉痛掌中熱譫音占亂言也妄見虛妄而言也眩玄去聲眩暈昏亂也僕音付卒然而倒也手太陽小腸經病則嗌乾頷腫不可回顧肩似拔臑似折虛則少腹控卵引腰脅上衝心痛耳聾目黃頰頷腫肩臑肘臂外廉痛嗌音亦氣系也少腹臍下兩旁也控引也卵陰丸也足太陽膀胱經病則沖頭痛目似脫項似拔腰似折髀不可以曲膕如結腨如裂虛則痔盛則瘧狂巔疾頸項囟頂腦戶中痛目黃淚出項背腰脊尻後膕腳皆痛小趾不為用沖頭痛腦後橫衝眉間痛也膕曲腳後也結括也腨市兗切一名臁俗所謂腿肚也巔頂也尻居刀切後陰後分合處也大而言之睢也足少陰腎經病則飢不欲食面黑如漆咳唾則有血喝喝而喘坐而欲起目䀮䀮如無所見心懸如飢腹大脛腫喘咳身重寢汗出憎風虛則腹滿身重濡泄寒瘍流水腰股痛發膕腨促膝不便煩冤足痿清厥意不樂大便難善恐心惕惕如人將捕之口熱舌乾咽腫上氣嗌乾而痛心煩而痛黃疸腸澼脊股內後廉痛痿厥嗜臥臥不安足下熱而痛喝乙介切䀮音荒濡溏泄也寒瘍俗言凍瘡不便不利便也煩冤心悶亂不寧痿痹弱清厥手足清冷而厥逆也痿厥欲臥而不安也腸澼下利也手厥陰心胞絡病則手心熱臂肘攣急腋腫甚則胸脅支滿心淡淡大動面赤目黃喜笑不休虛則煩心心痛掌中熱淡淡水搖動貌手少陽三焦病則耳聾渾渾焞焞虛則目鋭眥痛耳後肩臑肘臂外皆痛小指次指不能為用足少陽膽經原缺足厥陰肝經病則腰不可俯仰丈夫㿗疝婦人少腹腫兩脅下痛引少腹甚則嗌乾面塵善怒忽忽眩痛巔疾目赤腫痛耳聾頰痛虛則目䀮䀮如無所見無所聞善恐如人欲捕之胸滿嘔逆洞泄狐疝遺尿癃閉腋下曰脅脅下骨為肋脅肋之下曰胠音區面塵面如浮塵忽忽昏亂也眩頭目眩暈也洞疾流也狐疝言狐者疝氣之變化隱見往來不可測如狐也遺尿癃閉小便癃閉而病疲憊也內外八邪外有風寒暑濕內有飢飽勞逸勞逸非奔逸之逸乃逸豫怠惰而生病也與勞相反故經曰勞者溫之逸者行之使氣血運行也西山記曰久勞則安間以保其極力之處久逸則導引以宣其積滯之氣或作役者誤也內外病生四類一者因氣變動而內成積聚癥瘕癲狂驚癇之類也癥音貞堅積瘕音假血氣聚也多喜曰癲多怒曰狂二者因氣變動而外成癰腫瘡瘍痂疥疽痔掉眩浮腫目赤熛疹胕腫痛癢之類也不因一時所傷而病乃久以漸積臟腑變動興衰而病者是曰因氣變動也臟腑和平卒然而即成病者是曰不因氣之變動也淺而大曰癰深而惡曰疽掉動搖也熛音漂赤丹留毒火熛也三者不因氣之變動而病生於內則留飲僻食飢飽勞損宿食霍亂悲恐想慕憂結之類也僻邪也霍亂上吐而下瀉也四者不因氣之變動而病生於外則瘴氣鬼魅蟲蛇蠱毒蜚尸鬼擊沖薄墜墮斫射刺割捶撲打探𢾩拉觸抹風寒暑濕之類也蜚去聲獸也通言獸所傷人九氣怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結炅音桂熱也舊音耿非人怒則氣逆甚則嘔血及飧泄故氣上也人喜則氣和而志達榮衛通利故氣緩緩猶和也故令人氣散也悲則心系急肺布葉舉而上焦不通榮衛不散熱氣在中故令人氣消也恐則氣卻卻則上焦閉閉則氣還還則下焦脹故氣下也寒則腠理閉而氣不行故氣收也炅者熱也熱則腠理開而榮衛通汗大泄故氣泄也驚則心無所倚神無所歸慮無所定故氣亂也勞則喘且汗出內外皆越故氣耗也越散越也思則心有所存神有所歸正氣留而不行故氣結也結者滯而不通也五邪母乘子曰虛邪乘勝也克也如心火熱乘脾土也子乘母曰實邪如肺金燥乘脾土也妻乘夫曰微邪如腎水寒乘脾土也夫乘妻曰賊邪如肝木風乘脾土也自病曰正邪如脾土自病濕也五臟腑同法各以類推五邪微甚微實正虛賊從微至甚也此亦大略之言細而推之各有微甚十干夫婦配合成五運甲己合為土運甲剛木克己柔土為夫婦成土運乙庚合為金運乙柔木嫁庚剛金丁壬合為木運丁陰火配壬陽水丙辛合為水運丙陽火娶辛柔金戊癸合為火運戊陽土娶癸陰水五運太過不及陽剛夫為太過陰柔妻為不及此其略也凡六十四年而周甲子其中有歲運同司天曰天府同歲支曰歲會孟年同曰支德符歲運同司地剛為同天符柔為同歲會凡此二十九歲太過司天克之曰天刑及年前大寒交氣日反時程與運程為夫婦曰程德符皆非太過不及乃年運之氣也申子辰年寅初交巳酉丑年巳初交寅午戌年申初交亥卯未年亥初交氣也十二支應六氣三陰三陽六氣為本三陰三陽為標子午少陰君火暑丑未太陰濕土寅申少陽相火主大熱卯酉陽明燥金辰戌太陽寒水巳亥厥陰風木六氣有餘不足孟少仲平季多也內經以寅申巳亥四孟為一陰一陽也子午卯酉四仲為一陰一陽也辰戌醜未為三陰三陽也然陽為先故主虛無變化輕微而少陰為後故形體安靜重濁而多也故風火動亂至陽為先居孟未甚為少寒濕肅靜至陰為後居季已甚而為多燥熱各得乎中故居仲而平也注曰氣有多少是言六氣形有旺衰言五運也六氣寒暑燥濕風火五運應五臟主病諸風掉眩皆屬肝木諸痛癢瘡瘍皆屬心火諸濕腫滿皆屬脾土諸寒收引皆屬腎水諸氣膹郁病痿皆屬肺金膹悶亂也郁結滯壅塞也六氣為病諸暴強直支痛耍戾裡急筋縮皆屬於風乃厥陰風木肝膽之氣也諸病喘嘔吐酸暴注下迫轉筋小便渾濁腹脹大鼓之如鼓有聲癰疽瘍疹瘤氣結核吐下霍亂瞀郁腫脹鼻塞鼽衄血溢血泄淋閉身熱惡寒戰栗驚惑悲笑譫妄衄衊血汗皆屬於熱少陰君火乃真心小腸之氣也注泄也下迫後痛裡急痛也結核言肌肉結硬如果中核也溢上出泄下出衊音慢血汗也衄音肉鼻出血也諸痙強直積飲痞隔中滿霍亂吐下體重胕腫肉如泥而按不復起皆屬於濕也太陰濕土乃脾與胃之氣也痙其井切似風狂病也一名曰痓尺至切積飲水蓄不散也痞否腸胃氣液血脈否閉不能運行謂之痞也水穀傳化阻隔失常則曰膈胕音附諸熱瞀瘛筋惕悸動搐搦瘛瘲暴喑冒昧躁擾狂越罵詈驚駭胕腫疼酸氣逆衝上禁栗如喪神守嚏嘔瘡瘍喉痹耳鳴及聾嘔湧溢食不下目昧不明暴注瞤瘛暴病暴死皆主於火也手少陽相火乃心包絡三焦之氣也瘛尺至切喑音啞啞狂躁亂髮狂也禁栗寒戰如喪心神之守嚏音帝瘲音縱兒病也瘛音契小兒病也諸澀枯涸幹徑皴揭皆屬於燥陽明燥金肺與大腸之氣諸病上下所出水液澄徹清冷癥瘕㿗疝堅痞腹滿急痛下利青白食已不飢吐利腥穢屈伸不便厥逆禁固皆屬於寒太陽寒水乃腎與膀胱之氣也論脈三部九候夫三部者寸關尺也寸應天為上部關應人為中部尺應地為下部九候者各浮於天沉於地中為人也脈位輕重高骨旁動脈為關中指正按高骨之端是也俗不明其正理但以應於下指而差高骨於頭中指之間如此則三指各差在本位之後半部耳或以頭指正在高骨或更在高骨之後者此不通脈之正理也便使心精瞭然既下指失其本位則亦無以知為何病也關前至魚際為寸是名陽位一名寸口正在東關前堂骨後赤白肥肉際宛中骨縫陷中可容一豆者是乃名魚際者也關後為尺是名陰位關後至本經於太陰所入為合在肘內大約紋動處是名尺澤長一尺故名尺也陰陽兩者之間則名關三部長三寸以應三才凡男左女右以中指與大指相接如關度中指上仄中節兩橫紋之際為一寸凡取穴以此為則而脈位之尺寸亦應此也凡寸脈主自心胸上至頭也而關脈主中心胃至臍也尺脈主下臍以至足也左寸主心及小腸君火左關主肝膽風木左尺主腎膀胱寒水右寸主肺大腸燥金右關主脾胃濕土右尺主命門三焦相火所以然者左手為陽陽為君面南布政而陽始於子水以一歲六氣正位分之則應於亥正至醜終氣衰也水之位主於左尺之脈脈從尺入寸故水生風木於左關應醜至卯初之氣也木生君火於左寸陽道已成故為君火猶乾始於子而終於巳也自卯正至巳二之氣也君上而臣下陽進而升陰退而降故右手為陰始於午火火面北而受氣自巳至未正三之氣也三焦為正火主右尺之脈相火生濕土於右關正未以至酉四之氣也濕土生金於右寸應酉至亥五之氣也又主左尺水周而復始也及夫男左女右為夫婦故左寸君火克右寸之金左關木克右關之土左尺水克右尺之火及夫命門者右腎也屬火不屬水乃手厥陰心包絡之臟舉世皆言心包絡之臟有名而無形由不明理也夫三焦乃水穀傳化之道路自口至胃上口為上焦下至胃下二腸分處為中焦下至傳化出處為下焦通曰三焦今俗妄言無形狀而空有名者誤也且如人從頭數至足皆不謂之人則亦安可言人無形狀耶全身而言之固名人也且血脈盡皆環貫臟腑運行周身如果無命三焦之形體則何得氣血運行之道路耶各浮於腑而沉於臟中而和緩者胸也脈在肌肉以上曰浮在肌肉之下曰沉或以肺養皮毛心養血脈脾養肌肉肝養筋膜腎養骨髓以此浮沉而分五臟之脈者言脈位則可為用則有失治病之道也脈息遲速呼為陽以應天脈再動以應春夏吸為陰以應地脈再動以應冬秋氣出為呼入為吸再兩次也動至也或閏以太息而又一動者以應長夏脾土故一息四至五至皆為和平太息言呼吸或有長者也長夏六月也和平言為平人不病之脈謂一歲四時俱備也五至以上曰數不滿四至曰遲數過備者死不及一至者亦死數為熱遲為寒過備八至之上也是以平人之息合病人之脈也故經曰常以不病調病人由是小兒八至為和平十至有熱六至為病寒也自六歲以下通曰以此三歲之法人小則脈如數長短亦然七表浮芤滑實弦緊洪此名七表為陽少陽之數為七浮脈者輕手乃得重按之不見脈見諸陽為表熱諸陰為表寒脈動於肌肉之上也浮屬陽為病在表一名腑病或傷風自汗脈浮為表熱遲緩之陰者表寒芤脈者浮大而軟按之中央虛兩邊實也芤主熱甚失血寸芤則吐血微則衄甚則俱出關芤則胸癰下血尺芤則大便血微則小便血甚則俱下滑脈者不澀也多與實數相兼則為病熱或亡液血衰雖熱而反澀也或滑兼遲則為病寒平而滑者腎之本脈實脈大而長浮沉皆得而數陽熱也弦脈者軟虛而滑端直而長也弦主於風或如琴絃或如張弓者弦之太過也緊者不緩也或如轉索或如切繩者緊之太過也緊脈主痛多與實數相兼則為熱痛或短緊微細陰脈相兼者寒痛也洪脈者極大而數舉按者指實熱之極甚者也八里八里為陰象易少陰之數八微沉緩澀遲伏濡弱也微脈者若有若無極細而軟也多兼於遲主於陰寒然或熱甚汗泄吐利氣而損虛者或陽厥極深者或陽極將死脈欲絶者脈亦有微沉緩澀遲伏濡弱諸陰脈見也不寒便言為寒須以標本明之先病為本根本也後病為標梢末又為病之氣為本受病之臟腑經絡為標世俗至此更不明其陽極熱證但以執其陰脈為寒內外急救于于陽則殘陰暴絶而反致死亡者不少也且察色聽聲問證切脈為神聖功巧別病之四法而脈最為下則安可執巧之一法而去其神聖功之三法耶及夫八里之脈皆有此義以微脈居先故於此總而言之也沉脈輕手不見重切之乃得動在肌肉之下其位屬陰為病在裡一名臟病或蓄於胸及膀胱者雖為腑病其脈亦沉則皆宜下之由十二臟腑俱在裡而經絡皆在表也大抵但以浮為表沉為里然雖臟為陰主裡腑為陽主表其於病脈之浮沉有所不拘也故太陰脾臟之病腹滿而脈浮者桂枝攻於表也夫脈沉數為裡熱沉遲為裡寒餘脈皆仿此或裡熱吐利氣液虛損或陽厥極深或熱極將死者亦皆見諸陰脈沉切宜審之不可妄以施治緩脈者縱緩而不急似遲而小疾緩而遲為寒緩大長為熱當傷風自汗或自汗過多亦為遲緩熱更甚也澀脈者澀而不滑也或如刀刮竹或澀而止住者澀之太過主液血衰由汗泄吐利或血溢血泄或熱盛耗液而成燥也一曰澀主心痛血少故也以心養血遲脈者一息四至以下也遲為病寒然熱盛自汗吐利過極則亦為遲也氣液損虛故脈遲而不能數伏脈者脈附於骨沉之甚也伏主水蓄於內積飲不散也伏位屬陰在裡深也病之寒熱以隨陰陽別之附切近也水蓄於內一名留飲濡脈者按之似無舉之無力也有似微弱多兼於遲主於極冷然熱泄後或熱極將死者脈亦濡弱須以外證標本參之弱脈者軟虛而無力也弱之虛冷必兼微與遲也然而傷風中暑熱甚而自汗大出則易緩弱而遲也四時平脈春弦夏洪一曰數一曰鉤秋毛一曰潘一曰浮冬石一曰沉六步主位平脈初之氣自大寒日至春分厥陰風木之陽用事而氣微故曰冬至後日甲子少陽主然冬至甲子斯無常準以大約分之一月如在冬後即大寒交初氣之分也一歲六周甲子以應六氣下皆仿此一氣正月二月也脈乍大乍小乍短乍長時物及風木之象也二之氣春分至小滿少陰君火之位陽氣清正在兩陽合明之間故又云陽明主脈弦也三之氣小滿日至大暑少陽相火之位陽氣萬物皆盛故亦云太陽主脈洪大而長天氣萬物人脈與造化同四之氣大暑日至秋分太陰濕土之位天氣尚盛而夏後陰已用事故又云太陰主此三陰三陽與六氣標本之陰陽異矣脈緩大而長或云緊大而長者傳寫之誤也濕土主緩大而長燥金主緊細而短澀以萬物乾溼明可見焉時濕土盛膚腠開通汗液時泄故脈雖大長而力緩不能緊也至秋後氣衰寒涼乍閉故雖微細而力緊也五之氣秋分日以至小雪陽明燥金之位氣衰陰盛故又云少陰主也脈緊細而微終之氣一曰六之氣小雪日以至大寒太陽寒水之位陰極而終盡天氣之所收隱故曰厥陰主厥者盡也脈沉短以敦敦厚也萬物收藏在內寒氣閉塞而膚腠氣液不能散越故脈沉短而反有力敦厚而如石也凡四時六位平脈大退則時氣有餘而為病如春弦太過則風為病不及者氣衰而為病四時脈微見為平此言過微也如秋脈微而兼夏脈之類也反見他脈者他氣有餘而來為病也遲為寒而數為熱之類也結促代結脈者遲緩而時一止為陰也主陰盛發躁煩滿或陽厥極深以至身冷脈微欲絶而緩弱時一止者亦胸煩躁此止為熱極而非寒也皆須以標本明之促脈者陽也數而時一止也主聚積氣痞憂思所成亦或熱劇失下則令脈促下之則平也代脈者主緩弱而無力不能動因而復動病必危而死趺陽脈趺陽脈者胃土之脈也趺陽脈遲而緩者胃氣如經也動在足趺陽之經故曰趺陽一曰衝陽者陽明所過之原過者沖也如經如本經之常脈滑為胃實緊為脾強浮而滑者浮為胃虛滑則為噦浮而鼻中燥者必衄也沉為胃實上本下故也數為消穀胃熱故也緊則難治蓋四時五臟皆以胃氣為本緊燥盛而土濕氣衰故曰難治浮而大者氣實血虛也氣為陽血為陰故也浮而澀者胃虛下利也去液故澀伏而澀者伏則吐逆水穀不化內濕故也澀則氣不下食脈不出則身冷膚硬太溪脈太溪者腎水之脈也動於左足內踝下後跟骨下陷中足少陰腎水之胃故曰大浮也太溪脈則腎氣如經也弱則微煩澀則厥逆微厥也死生脈候陽病熱證不退反見陰脈者死脈近於絶故也汗後熱退而見陰脈者愈陰陽證脈平愈傷寒咳逆上氣脈散者死形損故也脈浮而洪身汗如油喘而不休水漿不入形體不仁不仁者不和也乍靜乍動命絶也汗出發潤喘不休者肺先絶也陽反獨留體如煙薰直視搖頭心先絶也唇吻音穩反青四肢漐習者肝絶也漐醜入切汗出也習水流不絶此言汗不止也環口黧黑柔汗發黃者脾先絶也柔虛也溲便遺失狂言直視者腎先絶也溲小便便大便寸口脈陰陽俱緊盛寸口即氣口此言三部關前為陽關後為陰大汗出不解者死身熱喘粗見陽脈而躁者死汗不勝病也汗後微熱不解者病不可便言死也脈如轉索者當日死譫語身微熱脈浮大手足溫者生欲作大汗故也俗作好汗脈暴出者死陰衰欲絶而陽暴獨勝則脈暴出少間陰氣先絶則陽氣後竭而死矣逆冷脈沉細者不過一日死死證多矣以致危極則無越此矣
