front:
  text: 序習醫要用直格乃河間高尚先生劉守真所述也守真深明素問造化陰陽之理比嘗語豫曰傷寒謂之大病者死生在六七日之間經曰人之傷於寒也則為病熱古今亦通謂之傷寒熱病前三日太陽陽明少陽受之熱壯於表汗之則愈後三日太陰少陰厥陰受之熱傳於裡下之則痊六經傳受自淺至深皆是熱證非有陰寒之病古聖訓陰陽為表裡惟仲景深得其旨厥後朱肱奉議作活人書尚失仲景本意將陰陽字釋作寒熱此差之毫釐失之千里而中間誤罹橫夭者蓋不少焉不可不知也豫語守真曰先生之論如此何不闢此說以暴耀當世以革醫流之弊反忍而無言何邪守真曰世之所集各異人情喜溫而惡寒恐論者不詳反生疑謗又曰欲編書十卷尚未能就故弗克耳今太原書坊劉生鋟梓以廣其傳深有益於世如宵行冥冥迷不知徑忽遇明燈巨火正路昭然若有執迷而不知信行者固不足言而聰明博雅君子能於此者原始反終研精覃思則其所得又何待豫之喋喋也據金馬宗素傷寒醫鑑作平城翟公序
