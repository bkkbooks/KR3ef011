body:
  text: 卷下諸證藥石分劑麻黃散麻黃一兩半去節湯泡去黃汁焙乾稱桂枝一兩削去皴皮官桂是也甘草半兩炙杏仁二十粒湯浸去皮尖雙仁者下並同法上銼如麻豆大每服五錢匕匕匙也謂錢作匙抄也水一盞半煎至八分濾去滓溫服滓阻史切澱也𥹁也衣覆以取微汗或溫病身煩痛小便自利者加白朮四分微汗之每一分二錢半也益元散一名天水散一名太白散滑石六兩白膩好者甘草一兩上為細末每服三錢蜜少許溫水調下或無蜜亦可每日三服或欲冷飲者新井泉調下亦得解利發汗煎蔥白豆豉湯下每服水一盞蔥白五寸豆豉五十粒煮取汁七分調並三四服以效為度此藥是寒涼解散熱鬱設病甚不解多服無害但有益耳本世傳名太白散俗惡性寒蔥易得之賤物而又不明素問造化之理故不取本草神驗之言而多不用焉若以隨證驗之乃凡人之仙藥也何可缺歟夫傷寒當汗則不可下當下則不可汗且如誤服此藥則汗自不出而裡熱亦不獲效亦有裡熱便得宣通而愈者也或半在表半在裡可和解而不可吐下發汗者若服此藥多愈或不愈亦小減加涼膈散和解尤佳或自當汗解者更加蒼朮粗末三錢同蔥豉煎湯調服尤良或孕婦不宜滑石麻黃桂枝輩發汗即用甘草一兩蒼朮二兩同為粗末每服四錢水一盞蔥白五寸豉五十粒同煎至六分濾去滓熱服並二三服取微汗是名逼毒散非孕婦亦可服或太白散加麻黃二兩去節如法煎服世云神白散或逼毒散加麻黃與蒼朮等分去節濟衆云青龍散或青龍散更加滑石末與蒼朮二倍是為發汗之妙藥名曰大逼毒散此方唯正可汗者即用誤服之則轉加熱也或解利兩感煎涼膈調下益元散四錢或下乳用豬肉面羹粥飲湯之類調下四錢不拘時候日三服及宜食肉面羹粥催産溫香油漿調下五錢並二三服以産為度或死胎不下者煎三一承氣湯一服調下益元散五錢須臾更頻用油漿調益元散溫服前後俱下而胎下可活産母也凡難産或死胎不下皆由風熱燥澀緊斂結滯而不能舒緩故産戶不得自然開通也此藥力至則結滯頓開而産矣後慎不可溫補而反生燥熱也俗未知産後亡液損血疼痛怖懼以致神狂氣亂則陰氣損虛邪熱太甚而為諸熱證由不讀素問不知造化故不識證候陰陽反以妄為産諸虛百損便為虛冷而無熱也誤以熱藥溫補或見煩渴者不令飲水本雖善心為害多矣豈治病之道但以臨時審其臟腑六氣虛實明其標本如法治之而已矣此藥泛常多用然須為效至大而俗以病異藥同將謂妄行反招侮慢今以黃丹加令桃紅色名曰紅玉散加青黛令輕碧色名碧玉散加薄荷葉一分名雞蘇散主療不殊收效則一俗目懵然何能別此可遠妄侮可顯玄功後之學者其究心焉桂枝湯桂枝去皴芍藥甘草炙等分三分為率上銼如麻豆大每服八錢水一盞半姜三片棗三枚擘破煎至七分令去滓溫服續後啜熱稀粥溫覆令遍身微汗或暖也及初夏可加黃芩一兩名陽旦湯大熱之分及素有熱人可再加知母半兩石膏一兩為末或更加升麻一分禁生冷黏滑肉面五辛酒酪臭物等桂枝證反下之不成結胸及痞但腹滿證在者本方倍加芍藥大實痛者更加大黃半兩脈弱自利者不加桂枝加葛根湯桂枝芍藥甘草各六錢三字葛根一兩三錢上如桂枝湯服謂如桂枝湯銼煎服也下並仿此葛根湯葛根一兩麻黃泡去黃汁焙乾稱三分桂枝去皴芍藥甘草炙各半兩上如桂枝湯服大青龍湯麻黃如前制石膏為末各三分桂枝一分半甘草炙一分杏仁十枚湯去皮尖雙仁上銼如麻豆大抄五錢水一盞生薑三片棗三枚擘破煎至半盞濾去滓溫服令身汗濕未潤再服小青龍湯麻黃如前制半夏湯洗芍藥細辛乾薑甘草炙桂枝去皴各三分五味子二錢上銼麻豆大每服八錢水一盞半生薑四片煎至七分絞汁溫服渴者去半夏加栝蔞根三錢微利去麻黃加芫花彈子大噎者去麻黃加附子二錢炮以開怫熱結滯小便不利少腹滿者去麻黃加茯苓四錢喘者去麻黃加杏仁制如前法此方燥至溫散其水以潤腸胃臟腑之燥以開發怫熱結滯者也小柴胡湯柴胡去苗稱二兩黃芩甘草人參各三分半夏六錢泡五七次上銼如麻豆大抄五錢生薑三片棗三枚切煎至半盞濾去滓溫服日三小兒一服作三服諸藥法同涼膈散一名連翹飲子連翹一兩山梔子大黃薄荷葉去毛黃芩各半兩甘草一兩半朴硝一分上為粗末每服二三錢水一盞蜜少許或無蜜亦可舊用竹葉或亦不須煎至七分濾去滓溫服熱甚者可服四錢亦有可服一二十錢者治咽喉並涎嗽加桔梗一兩荊芥穗半兩咳而嘔者本方加半夏半兩每服生薑三片煎衄嘔血者加當歸芍藥各半兩生地黃一兩淋者加滑石四兩茯苓一兩風眩者加川芎防風各半兩石膏三兩酒毒者加葛根一兩斑疹痘瘡加荊芥穗赤芍藥川芎防風桔梗各半兩三歲兒可服七八錢或熱甚黑陷腹滿喘急小便赤澀而將死者此一服更加大承氣湯約以下之得利立蘇凡言加者皆自本方加也但加者每服五七錢以意加減調理兩感傷寒下證前後以退表裡之熱者煎本方四五錢調下益元散三四錢其本方皆能治此諸證但加即為效也白虎湯知母一兩半甘草一兩炙粳米一合石膏四兩為末上銼麻豆大抄五錢水一盞煎至六分去滓溫服無時日三四服熱甚者服七八錢至十餘錢或眩或嘔或咳者加半夏半兩陳皮半兩每服用生薑三片煎服或傷寒發汗不解脈浮者加蒼朮半兩名曰蒼朮白虎湯或發汗或下後煩渴口乾或脈洪大或微惡寒者或不可下者或除可者之藥外並宜加人參半兩以調之名人參白虎湯五苓散豬苓去黑皮茯苓白朮各半兩桂去皴一分澤瀉一兩上為細末每服二三錢熱湯調下惡熱欲冷飲者新水調下或生薑湯調下愈妙或加滑石二兩甚或喘嗽咳煩心不得眠者更加阿膠半兩炮桂苓甘露飲一名桂苓白朮散桂半兩茯苓白朮各半兩甘草炙澤瀉石膏寒水石各一兩滑石二兩制如前上為極細末熱湯調下三錢欲冷飲者新水調下或生薑湯調下尤良小兒服一錢白朮散白朮茯苓去皮人參藿香葉淨各半兩甘草炙一兩半木香一分葛根一兩上為細末白湯調下三錢若煩渴者加滑石二兩病甚者為粗末每服一兩半水一大升煎至七合絞汁放冷從意續續飲之小兒尤宜四逆湯甘草炙乾薑各一分附子半個生去皮臍凡用附子以半兩重者佳小者力弱大者性惡非稱處方之宜也世皆美其大者未知古人之有則也上銼麻豆大用水兩盞煮至一盞絞汁分溫二服強實人二劑作三服或蓄熱極深者手足厥冷則不宜此方當以下之也茯苓半夏湯茯苓去皮生薑取汁各一分半夏一錢上銼麻豆大用水一盞煎至四分絞汁下薑汁溫服半夏橘皮湯半夏炮如法陳皮湯浸洗去穰甘草炙人參茯苓黃芩去腐心各一分葛根半兩厚朴去皮各一分上銼麻豆大用水三盞生薑一分切煎至一盞半絞取汁分四服作一日食後溫服黃連解毒湯黃連去須黃柏黃芩大梔子各半兩上銼麻豆大每服稱半兩水一茶盞煎至四分絞取汁溫服無時日三四以效為度每一二服效或腹滿嘔吐或欲作利者每服加半夏三枚全用厚朴二錢銼茯苓去皮銼水一盞半生薑三片煎至半盞絞汁溫服名曰半夏黃連解毒湯或欲急下者本方加大承氣湯一服生薑煎如前法以利為度一法為細末水研如小豆大溫水下二十丸治積熱勞咳瀉痢甚良瓜蒂散瓜蒂赤小豆等分上為細末以香豉半合豆豉也水一盞半煮取汁半盞調下一錢匕不吐加服得快吐乃止虛人不宜大柴胡湯柴胡去苗稱大黃各半兩黃芩芍藥各一分半夏二錢枳實三錢生用小者是也枳實不去穰為效甚速下並同上銼麻豆大分作三服每服水一盞生薑三片棗三枚煎至半盞絞取汁溫服未利再服大承氣湯大黃芒硝朴硝有芒頭者亦得厚朴去皴枳實各半兩加甘草一兩是名三一承氣湯上銼麻豆大分一半用水一盞半生薑三片煎至六分納硝煎一二沸絞去滓熱服凡煎藥須慢火煎沸即下火為一沸或言煎至幾分亦如此法煎不可強火耗去其水也凡病熱鬱甚而冷服寒藥則病能拒藥多不能下故經曰寒因熱用未利再服熱甚者此一劑分大半作一服未利再服少半熱更甚者一劑都作一服熱勢甚者亦可並此二劑為一服劑分劑一劑為一料方得利而效者臨時消息以利為度消息謂損益多少也凡用藥多少仿於此耳小承氣湯大黃半兩厚朴三錢枳實三錢上銼如麻豆大作二服每服用水一盞生薑三片煎至半盞絞取汁熱服未利再服或微下者一劑分作二服或和胃氣不欲利者一劑分為四五服調胃承氣湯甘草大黃芒硝各半兩上銼如麻豆大分一半用水一大盞煎至半盞絞去滓納硝煎一二沸熱服不利再服十棗湯芫花慢火炒變色大戟甘遂各等分上為散細末用水一盞肥棗十枚切開煮取汁半盞調下半錢匕強實人服一錢匕以意加減快利為度桃仁承氣湯桃仁湯去皮尖雙仁用板錘碎原缺分量芒硝半兩大黃六錢桂去皴皮甘草各三錢上銼如麻豆大分作三服每服用水一盞煎至半盞下硝絞取汁熱服日三以微利為度抵當丸水蛭炒虻蟲炒各七枚桃仁八粒大黃一錢上為細末蜜和作二丸用水一小盞煮一丸至六分溫服睟時血未下者再服抵當湯水蛭炒虻蟲炒去翅足各十枚桃仁七枚大黃一錢上銼如麻豆大分作二服每用水一盞煮半盞絞去滓溫服未下再服蛭之吉丁結二切水蟣也虻莫庚切茵陳湯茵陳蒿去莖一兩一名山茵陳川大黃半兩山梔子七枚小者十枚上銼如麻豆大用水兩盞半慢火煮至一盞絞取汁溫服六分未利再服四分以利為度勢甚者作一服未利再作以意加減當下如爛魚肚及膿血膠膘等物及小便多出金色如皂角汁或見證將欲發黃者此一劑分作四服每服調下五苓散三錢凡治發黃無越此法也世俗有傳烙黃而或愈者此強實之人素本中氣不衰而及濕勢郁之微者烙之而誤中強劫開發得開氣血宣通即作汗而愈或體質本虛濕熱結甚則劫發不開而反致死者不為少矣莫若仲景法對證以藥致之則免致強劫不開而反誤人生命也及夫近世妄傳有寒極陰黃而內外極救其陽為害多矣設若病微而誤中開發得愈亦已鮮矣而傷生者不可勝言也大抵凡諸黃者有二一則濕熱氣而黃萬物皆然又如麥秀而霒雨濕熱過極則黃疸者也及水潦而天氣濕熱則草木將死而色變黃者也或病血液衰則虛燥熱太甚而身面痿黃者猶亢旱而草木萎黃也夫病燥熱而黃者當退熱潤燥而已此傷寒濕熱極甚而發黃者開結退熱雙利大小腑以除水濕則利和而愈也霒於林切今作陰結胸而發黃者同陷胸湯各半服下之或誤服巴豆熱毒丸藥下之反損陰氣遂協熱利不止而發黃者同大承氣各半服下之亦有協熱利不止更或結胸而發黃者用茵陳五分同陷胸湯三分大承氣二分以下之或兩感發黃者本方加黃連解毒湯一服急下之或頭微汗小便利而微黃者濕熱微也宜此梔子柏皮湯大山梔子十五枚甘草一錢黃柏半兩上銼如麻豆大此劑則作二服每服水三盞煮至一盞取絞汁分三次作一日服大陷胸湯大黃芒硝各三錢甘遂末三字匕上銼如麻豆大一劑分作二服每服用水一盞煮大黃至六分內硝煎一二沸絞汁內甘遂末一字匕半溫服未快利再服熱惡不利者以意加服大陷胸丸大黃半兩葶藶三錢微炒芒硝一分杏仁十二個草灰炒色變上大黃為細末下葶藶杵再羅研杏仁硝如泥和丸如彈子大每服一丸入甘遂末三字匕白蜜半匙水一盞煮至半盞溫服當一宿許乃下未利再服小陷胸湯半夏四錢湯洗全用不銼生薑二錢切黃連二錢銼栝蔞實大者半個惟銼其殼子則不銼或但用其中子者非也上以水三盞煮栝蔞取汁一盞半內余藥煮至一盞絞取汁分兩次溫服以效為度大黃黃連瀉心湯大黃黃連黃芩各一分一法加生薑一分甚良梔子湯大梔子七枚銼碎豆豉半合上以水兩盞煮梔子至一盞半內豉煮至半盞絞汁溫服凡加者皆用梔子先煮或吐者止後服凡諸梔子湯皆非吐人之藥以其燥熱鬱結之甚而藥頓攻之不能開通則鬱發而吐因其嘔吐發開鬱結則氣通津液寬行而已故不須再服也梔子厚朴湯大梔子七枚厚朴半兩炙去粗皮枳實二錢上銼如麻豆大以水一盞半煮絞汁半盞溫服泛論凡傷寒熱病下後熱不退下證尚在者再三下之以熱退為度雖熱退尚未痊愈者隨證調之凡下之前後或大汗將出或大汗已出俗言好汗是言大汗或汗後煩渴及諸吐瀉雜病一切煩渴者須以細細飲之渴未止者頻頻時與但不可過多以成留飲不散者也留飲一名水蓄經曰積飲夫留飲謂水液留積蓄聚於內而不濕潤傳化者也夫腸胃燥熱太甚則結滯而氣液不能宣通故雖飲而難以止其煩渴也若以頓飲過多則水濕過極而腸胃燥熱怫鬱轉以加其水濕痞閉故成留飲而心腹滿痛或為吐瀉也設若不與飲之則燥熱轉甚危而死矣夫腸胃之燥濕猶地旱潦適當其宜皆不可過與不及凡治病之道以調六氣陰陽使無偏傾各守其常平和而矣嗟夫世俗或以妄為冷水寒藥水損脾腎隔卻大汗但令中外俱熱而欲望其作大汗者或大汗欲出腸胃燥熱煩渴及汗已出及慮水卻大汗不與水者或氣弱久虛煩渴者或吐瀉煩渴者或産婦煩渴皆以妄為氣虛不可飲水也此乃未知古人云渴欲飲水為熱在裡也若夫正氣既衰邪熱燥甚而煩渴者若非水液寒藥滋養救其殘陰退其邪熱則陽熱暴甚而為害速矣況不與水而反以大毒熱藥燥之寧無損者耶且如酒之體者水也比之飲水則過能多飲而旋能消散之外轉能發於渴者以其苦熱養於心火則陽盛陰衰而燥去水濕之體故旋能消散而善多飲水也其酒之善多飲者以其酒之熱毒若非復以水體勝之則亦少飲疾醉者強以飲多則燥熱太甚而多生病也然酒力之熱善消水體復製酒力以其熱力多於水體故飲多即熱醉而燥盡水體勢力尚在則燥熱煩渴而病於酒也然酒之熱耗盡水體之外尚能燥熱煩渴為病況病於燥熱太甚而煩渴及不與水者豈不知其害耶凡燥熱煩渴者腸胃易為怫鬱常以退熱開結散水潤燥之藥調之免致燥熱太甚則怫鬱以成留飲雖多飲亦不止其腸胃臟腑之燥熱煩渴而或腸胃之內濕甚以成吐瀉也涼膈白虎五苓及桂苓甘露散之類隨證以調之也或成留飲諸病者隨證燥之宜小青龍湯五苓桂苓甘露黃連解毒湯小陷胸大承氣之類證本方論中戰汗夫熱病大汗將出而反寒戰者古人以百病皆為雜病惟傷寒名曰大病俗言汗病是也經言大汗者非謂邪熱自汗大出者也乃陽氣怫熱鬱結後得開通發散宣通則蒸蒸而為汗出是謂大汗言大病怫熱邪毒之氣鬱極乃發以為汗出故曰大汗也故經曰大氣皆去病得已矣表之正氣與邪熱並甚於里大熱亢極而反兼水化制之故反寒栗也化謂造化之化也經曰少陰所至為驚或惡寒戰栗譫妄謂少陰君火熱氣之所至而為此等之病也又經曰諸禁鼓栗如喪神守皆屬於火注云熱之內作然禁俗作噤鼓振搖而動也言禁冷振栗反寒戰也經曰亢則害承乃制謂五行之道微者當其本化實甚過亢則反兼勝已之化以制其甚老子云天之道其張弓乎高者抑之斯其道也經云水曰靜順謂靜而自己無為但順物之氣味也及方圓不與物爭乃至柔順者也水本寒寒極則水冰如地而能載物又經曰水發而雹雪是水寒亢極而反似剋水之土化是謂兼化也故病寒極者反堅滿也夫土主濕霒雲雨而安靜雨濕極甚則飄驟散落是反兼風水制其土濕也故經言痙為濕極而反似風強病也木主生榮而王於春其氣濕其本風風大則反涼而毀折是兼金化制其本也故風病過極則中外燥澀皮膚皴揭反氣運行之燥澀而筋脈瘛緩是反兼金化也金主於秋而屬於陰其氣涼涼極則天氣清明而萬物反燥燥物莫若火是金極反兼火化制之也故為病血液衰少燥金之化極甚則反熱也燥物莫若火夏月火盛熱極甚則天氣曛昧而萬物反潤以出水液林木流津及體熱極而反出汗液以火鍊金熱極而反化為水是火極而反兼水化制之也故病熱極則反出五濕婦人帶下淋瀝及厥逆身冷或為惡寒戰栗而或反冷痛也俗以帶下直言冷病及惡寒戰栗便為陰寒者俗醫未知此也夫天道造化病微必當其本化寒見水化熱見火化也病甚者反似勝己之化如寒極反似濕土熱極反似寒水之化也嗟夫百病之極甚者其狀反似於己之相反者俗醫不求其病之本氣而百端擬疑莫知真源不得已而但隨兼化之虛象妄為其治反助其病而害於生命多矣以至舉世皆云病至危極之時則陰陽反變而無能辨別也殊不知但以運氣造化之理推之則設若千變萬化而歸其要則一也何得有難易之二邪故經曰夫標本之為道要而博小而大可以言一而知百病之害經又曰善言始者必念於終善言近者必知其遠是則至數而道不惑所謂明矣故老子曰不窺牖見天道不出戶見天下其出彌遠其知彌少蓋知要與不知要也古聖曰反常合道謂古聖天理大道合同而常俗之心則有相反者也然古聖道不離於俗者謂道包於俗而入俗也又云俗自離道者常俗莫能合於道也夫俗則有相而道本無形者正如五行之變化微則守常而本化自見乃有相之俗是化以自見也甚則反似勝己之化乃無相而反常合道是謂變以其取變於本化之相而反見勝己之化也變化之道多端此則微甚外相之變化也故仙經曰大道似不肖厚德若不足即藏其本相於內而反變化勝己之化於外無相乃反常合於道者也卻以道眼觀之則求其內也若但以俗眼觀其外則逐相而遷何由得其要也故聖經所論天地變化與道合同而俗無所慊但隨俗見編集方論有乖其理只合俗心致使後人皆由說反自以為明而聖經之妙理懵然罔究病者無辜竟罹橫夭籲可痛者且如經言陽勝則熱陰勝則寒俗直謂陽熱之氣勝則發熱陰寒之氣勝則發寒者皆經之本旨也此言表裡之陰陽正氣之虛實言正氣勝者為不病而不勝者為病也故經曰陰勝則陽病陽勝則陰病陽勝則熱陰勝則寒是謂表陽之正氣為不病里陰之正氣衰而為受病也里陰之正氣勝為不病表陽之正氣衰而為受病者也此皆熱在表裡陰陽之部分者也然病勝在里為陽勝陰虛病當發熱故發熱為病熱在裡陽勝陰虛下之則愈汗之即死者是也表熱里和則病當惡寒為陰勝陽虛汗之則愈下之即死者是也故熱在表為陰勝陽虛而言惡寒之寒則為寒也熱在裡為陽勝陰虛而言發熱之熱則為熱也故傷寒表熱則惡寒當汗裡熱則發熱而當下之又經曰重寒則熱重熱則寒者非謂病寒而極重反變也此重言當有兩重惡寒則不惡寒而惡熱謂表熱惡寒為一寒也若里之陽和正氣又出之於表則又當有一重惡寒是謂重寒則反不惡寒而為發熱也若表之正陽之氣與邪熱併入於裡則為兩重發熱則不發熱而復禁栗寒戰也此反言陽和衛氣並之於表陽分則病氣之勝為陽勝也病氣與衛氣並甚於里之陰分則為陰勝也此亦表裡之陰陽正氣之與邪熱相併而以言為虛實也然邪熱在於表則惡寒而熱與里之衛氣並之於表則反煩熱也邪熱獨在於里則發熱而表之正氣與邪熱並之於里則反寒戰也故經云陽虛則外寒陰虛則內熱此言不並者也正氣虛而受邪熱故言虛也又曰陽勝則外熱陰勝則內寒此言並者也夫表裡陰陽之分受其邪熱之所在其沖和正陽之衛氣又為邪熱相併而為病之所正氣轉實而不虛故經言勝也故經瘧論云陽氣並於陰當是之時陽虛而陰盛外無氣故先寒栗也陰氣逆極則復出之陽陽與陰復並於外則陰虛而陽實故先熱而渴又曰並於陽則陽勝並於陰則陰勝陰勝則寒陽勝則熱是言表裡之陰陽熱氣之虛實非寒熱陰陽之虛實也故經云病在陽則熱而脈燥在陰則寒而脈靜然氣並於內而外無氣故寒戰脈不能燥甚而沉細欲絶靜或不見也夫瘧者邪熱與衛氣並則作發而不並則休止也故經曰衛氣相離或病得休衛氣集則復病也故又云陰虛而陽盛陽盛則熱矣衰則氣復反入入則寒矣此只言表裡之陰陽氣不並者為虛而並者為實其為病之氣者乃熱之一也俗未明之直以經言陰勝則寒不明其經意以病熱而反惡寒戰栗便為陰寒之病誤之久矣其陰寒之為病者脈遲細不煩渴小便清白吐利腥穢屈伸不便厥逆禁固體寒而不熱不惡寒無戰栗者也故經言人多病氣也陽少陰多故身寒如從水中出又曰人有身寒湯火不能熱厚衣不能溫不凍栗此是陰寒為病而直云不凍栗寒冷也夫陽動陰靜故經云戰栗動搖為陽火熱氣以為病也反寒冷者亢則害承乃制是火熱極而反似寒水者也故病寒戰者反渴及雜病而寒戰者多有燥糞也及夫平人冒寒而戰栗者寒主閉藏而外冒於寒則裡熱怫鬱而表之陽和衛氣以外寒逼入於裡則陽並於陰而寒戰也夫恐極而戰者經言五志過極則勞傷本臟恐為腎故經曰恐傷腎然腎傷而虛則心火自甚而熱也又經曰恐則氣下然陽主出行舒榮故心火之志喜則身心放肆而陰主收藏故腎水之志恐則身心收斂也夫恐則腎虛心實而熱正氣收藏陷下於里亦是陽並於陰而寒戰也夫酒噤而戰者腸胃酒熱未散身表酒力已消則陽熱易為蓄熱入里故但冒於寒則陽並於陰而寒戰也夫欲汗而寒戰者傷寒日深表證罷蓄熱於裡則發熱也若表裡之正氣併入里則火熱無極而反寒戰也陰分陽熱之氣逆極而後出之陽則煩熱而大汗作也世所謂交陽者非陰寒交熱以為陽熱也乃怫熱蓄之於里而鬱極乃發則交傳出之於表之陽分是為交陽而後作汗也或怫鬱過極而不能交出於表者是鬱極不發否極不泰即正氣衰殘陰氣先絶則陽氣後竭而死矣夫欲汗而脈忽沉細而或不見者陽表正氣併入於裡故也交陽而燥亂昏冒者裡熱鬱極乃發而欲出以怫鬱而陽之氣極不能出故氣亂則神背而躁擾也凡欲作汗無問病之微甚或已經新下者或下證未全者恆以涼膈散調之甚者宜黃連解毒湯或下後二三日或未經下腹滿煩渴脈沉實而有下證者三一承氣湯下之勢惡者加黃連解毒湯下之或已戰不快者或戰後汗出不快者或微戰數次經大戰而汗不出者乃並之不甚而病之不速也通宜三一承氣湯或更加黃連解毒湯下之以散怫熱而開鬱結也大法曰脈浮不可下傷寒病已有里證脈沉下之里證尚在脈漸浮至一二日汗不能出者里證郁發之不峻病已三一承氣湯微下之凡此諸可下者或得利而汗便出者或服藥而怫鬱頓然開發先汗出而後利者或利性但隨汗出泄則氣和而愈更不利者說不快交不過而死者止由裡熱極甚而不能開發也故常以寒涼或下怫熱免致但以其作汗而為邪熱耗絶陰氣而死也或不戰而汗出者津液不盡而陽不並陰也或戰而無汗而自愈者津液已衰以經發汗吐利或自汗吐利亡液過多則津液衰竭無由作津但氣和而愈也或不戰無汗而愈者陽不並陰則不戰津液已衰故無汗而已也世俗未知而直以惡寒戰栗名陽熱氣虛陰寒實勝因而為治誤人多矣受汗夫大汗將出者慎不可限其煩熱而外用水濕及風涼制熱也陽熱開發將欲作汗而出者若為外風涼水濕所薄則怫熱反入於裡而不能出泄病多危極而死矣亦不可恨其汗遲而厚衣壅覆欲令大汗快而早出也怫熱已甚而鬱極乃發其發之微則順甚則逆順則發易逆則發難病已怫熱作發而煩熱悶亂更以厚衣壅覆太過則陽熱暴然太甚陰氣轉衰而正氣不榮則無由開發即燥熱喘滿危而死矣汗後雙解散普解風寒暑濕飢飽勞逸憂愁思慮恚怒悲恐四時中外諸邪所傷億覺身熱頭疼拘倦強痛無問自汗無汗憎寒發熱渴與不渴有甚傷寒疫癘汗病兩感風氣雜病一切舊病作發三曰裡外並宜服之設若感之勢甚本難解者常服三兩日間亦漸減可並無所損或裡熱極甚腹滿實痛煩渴譫妄須可急下者以大承氣湯下之三一承氣湯亦妙也或下後未愈或證未全或大汗前後逆氣或汗後餘熱不解或遺熱勞復或感他人病氣汗毒傳染或中瘴氣馬氣羊氣一切穢毒並漆毒酒食一切藥毒及墜墮打撲傷損疼痛或久新風眩頭疼中風偏枯破傷風洗頭風風癇病或婦人産後諸疾小兒驚風積熱瘡瘍疹痘諸證無問日數但服之周身中外氣血宣通病皆除愈是防風通聖散加天水散各一半防風川芎當歸切焙芍藥薄荷葉淨大黃麻黃去根苗節連翹芒硝別研各半兩石膏別研桔梗各一兩滑石十五兩別研白朮山梔子荊芥葉甘草四兩銼爛黃芩各一分上為粗末每服五錢六錢水一大盞半入蔥白五寸鹽豉五十粒生薑三片煎至一盞濾汁去滓溫服無時日三四服以效為度常服三錢水一中盞煎六分絞汁溫服不拘時兼夜四服設痊愈後更宜常服使病不再作新病不生並無過竟無問歲數乃平人常服之仙藥也凡人已衰老則腎水真陰損虛即風熱燥郁甚精血涸竭枯燥而死但以此藥扶補滋潤者也嗟夫世俗反以妄傳中年以上火氣漸衰止是虛冷更無熱病誤服熱毒之劑害人無數豈知識病之法全憑脈證以別寒熱陰陽虛實豈可以中年上下為則耶此藥除孕婦及産後月事經水過多並泄瀉者不宜服或治雜病亦宜治風熱極妙一名通氣防風散一名通解散傷寒傳染論夫傷寒傳染之由者因聞大汗穢毒以致神狂氣亂邪熱暴甚於內作發於外而為病也則如西山記曰近穢氣而觸真氣錢仲陽云步履糞穢之履無使近於嬰兒若聞其氣則令兒急驚風搐也孫真人云乘馬遠行至暮當沐浴更衣然後方可近於嬰兒使不聞馬汗氣毒不然則多為天吊急驚風搐也故剝死馬者感其毒氣而成馬氣丁黃之疾皆由聞其毒氣之所作也故聖惠方一法大汗出則懸藥於戶闢其大汗穢毒無使傷於人也世以艾灸席隅者皆其義也多染親屬憂戚侍奉之人勞役者由其神氣怯弱易為變亂故也何以知傳染脈不浮者是也若誤以熱藥解表不惟不解其病反甚而危殆矣其治之法自汗宜以蒼朮白虎湯無汗宜滑石涼膈散熱散而愈其不解者適其表裡微甚隨證治之而與傷寒之法皆無異也
