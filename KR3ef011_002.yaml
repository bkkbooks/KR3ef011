body:
  text: 卷中傷寒總評傷寒六經傳受經言寒傷形寒傷皮毛寒傷血寒傷榮然寒主閉藏而腠理閉密陽氣拂鬱不能通暢怫然內作故身熱燥而無汗故經曰人之傷於寒也則為病熱又曰夫熱病皆傷寒之類也內經既直言熱病者言一身為病之熱氣也以至仲景直言傷寒者言外傷之寒邪也以分風寒暑濕之所傷主療不同故只言傷寒而不通言熱病也其寒邪為害至大故一切內外所傷俱為受汗之熱病者通謂之傷寒也一名大病者皆以為害之大也又春曰溫病夏曰熱病秋曰濕病冬曰傷寒傷寒者是隨四時天氣春溫夏熱秋濕冬寒為名以明四時病之微甚及主療消息稍有不等大而言之則一也非為外傷及內病有此異耳或云冬伏寒邪於肌膚骨肉之間至於春變為溫病夏變為熱病秋變為濕病冬變為正傷寒病者及名冒其寒而內生拂熱熱微而不即病者以至將來陽熱變動或又感之而成熱病非謂伏其寒氣而反變寒為熱也經曰冬傷於寒春必病溫亦其義也亦有一時冒寒而便為熱病者或感四時不正乖戾之氣或隨氣運興衰變動或內外諸邪所傷或因他病變成或因他人傳染皆能成之但以分門隨證治之耳經言此六經傳受乃外傷於寒而為熱病之大略主療之要法也大法曰傷寒一日太陽受之故頭項痛腰脊強此足太陽膀胱之經也故與經言五日足少陰腎水為其表裡或言為手太陽者誤也此六經之證也或以此直云傷寒不傳手經者亦誤也豈不詳熱論云五臟六腑皆受病又刺熱篇皆言五臟熱病但以熱病多於足經而其病甚少於手經而其病微且與足經微為兼證汗下之治但分表裡故不單言手經而但寄於足經而已若針刺則本經補瀉各分五臟手足之經矣二日陽明受之故身熱目疼鼻乾不得眠也三日少陽受之故胸脅痛而耳聾四日太陰受之故腹滿而咽乾五日少陰受之故目燥舌乾而渴六日厥陰受之則煩滿囊縮或言傳手厥陰包絡相火則水火既濟而愈傳足厥陰肝經則土敗木賊而當死者妄說也此經言足厥陰肝經之證也大法曰前三日三陽病在表故宜汗之汗泄熱退身涼而愈後三日三陰病在裡故宜下之下退裡熱則怫熱宣通汗出氣和而愈也亦有內熱下盡無汗氣和而愈者也或曰前三日寒在表者誤也此皆熱證也或未愈者再經衰之七日太陽病衰自此以下皆言病自衰減頭項少愈八日陽明病衰身熱少愈九日少陽病衰耳能微聞十日太陰病衰身熱少愈腹滿如故十一日少陰病衰渴止不滿以言腹不復滿舌乾已而嚏十二日厥陰病衰囊縱少腹微下大氣皆去言大病熱氣散去病則瘳音抽愈也矣此亦大略言之耳傷寒受不必拘此但以明其諸證而如法治療耳裡外傷如得病脈便沉而里病表和者內傷也脈浮而表病里和者外傷也病在身體四肢為表病病在胸腹之內為里病表裡證身熱為熱在表言皮膚壯熱而反憎寒非謂自發熱燥也引飲煩渴或小便黃赤為熱在裡身熱飲水或小便黃赤為表裡皆有熱身涼不渴小便清白則表裡皆無熱不言為寒者蓋表裡熱微則亦有身表不熱而里亦不渴故也渾身疼痛拘急表熱惡寒而脈浮者皆為熱在表也引飲譫妄腹滿實痛發熱而脈沉者皆為熱在裡也胸脅痞痛或嘔而寒熱往來脈在肌肉不浮不沉則邪熱半在表半在裡也夫邪熱在表而淺邪微而畏正故病熱而反憎寒也寒則腠理益閉而怫熱益加故也邪熱在裡而深邪甚則不畏於正物盛其極故不惡寒而反自惡熱也半在表半在裡進退無常則寒熱往來也寒多為表多脈稍浮熱多為里多脈稍沉也諸病寒熱並同惟瘧疾反此由表之正氣與邪熱並之於里表氣虛而裡熱實亢則害承乃制故里之火熱極甚而反兼寒水之化制之故病熱極而反寒戰也臨汗而戰及諸戰皆然寒戰為裡熱表虛故也飲水而脈微不見也里之正氣與邪氣並出於表則表熱裡虛是以煩熱汗出而脈浮也經以熱並於里之陰分則為陰勝而發寒熱並於表之陽分則為陽勝而發熱也俗未知其為表裡之陰陽而妄為寒熱之陰陽故皆失內經之本旨也夫傷寒之寒熱者惡寒為表熱里和故脈浮發熱為里表氣不虛故發熱而脈沉實也氣並不並故寒熱相反而有微甚也熱並則甚不並則微也主療傷寒表證當汗而不可下反下之則蓄熱內余而成結胸或為虛痞懊憹喘滿腹痛下利不止發黃驚狂斑出諸熱變證危而死矣里證當下而不可汗反汗之則熱甚發黃驚狂斑出譫妄而喘悶亂危極而死矣半在表半在裡則宜和解相和通解表裡也不可發汗吐下妄治之則有前諸證在上則湧音湧吐也之言病在膈上如胸滿而嘔或眩脈關前緊甚者宜瓜蒂散吐之在下者瀉之言蓄熱下焦則承氣抵當之類瀉之皆隨病所在攻之傷寒無汗表病里和則麻黃湯汗之或天水散之類亦佳身熱惡寒無汗脈浮緊而數表不解半入於裡半尚在表者小柴胡湯主之或天水涼膈二藥各一服合同服之尤佳表裡之熱勢俱甚者大柴胡湯微下之更甚者大承氣湯下之表雖未罷而里證已甚若不下之則表熱更入於裡而裡熱危極宜以大柴胡大承氣下之雙除表裡之熱則免使但下里熱而下後表熱乘虛又入於裡而生結胸及痞諸病之類也表熱多裡熱少天水一涼膈半以和解也煎涼膈半服調天水一服上下同法裡熱多表熱少未可下之者涼膈一天水半調之勢更甚者小承氣湯下之表證罷但有里證者熱傳於裡也調胃承氣湯下之但除裡熱也凡此諸可下之言大柴胡三承氣諸下證通宜三乙承氣下之善能開發峻效而使之無表熱入里而成結胸及痞之衆病也發汗不解下證前後別無異證者通宜涼膈散調之以退其熱便無熱甚危極也除此之外遠勝小柴胡湯兩感仿此而已但隨表裡微甚而以調之兩感謂一日太陽與少陰兩證俱見二日陽明與太陰三日少陽與厥陰俱病前六經之證是也傷風自汗表病里和者桂枝湯解肌無汗為傷寒不可服桂枝湯有汗為傷風不可服麻黃湯半在表半在裡脈在肌肉而半入於裡白虎湯和解之病在裡脈當沉也大承氣湯下之一法無問風寒暑濕有汗無汗但有可下諸證或表裡兩證俱不見而病日深但目睛不了了者昏昧不精明或腹滿實痛者或煩渴或譫妄或狂躁喘滿者或蓄熱極深而將死者通宜大承氣湯下之或三乙承氣湯下之尤良傷寒大發汗汗出不解反無汗脈尚浮者蒼朮白虎湯再解之或中暑大汗自出脈虛弱頭痛口乾倦怠煩躁或時惡寒或畏日氣無問表裡通宜白虎湯或裡熱甚腹滿而脈沉可下者宜大承氣湯或三乙承氣湯尤妙傷寒表熱極甚身疼頭疼不可忍或眩或嘔里有微熱不可發汗吐下擬以小柴胡天水涼膈之類和解恐不能退其熱勢之甚者表熱勢甚而里已有熱發表未開則陽熱暴甚故不宜汗之表熱勢甚若吐下之則表之熱大乘虛而入反成結胸等證則危極也或大下後或再三下後熱勢尚甚而不能退本氣損虛而脈不能實擬更下之恐下脫而立死不下之則熱極而死寒溫諸藥不能退其熱勢之甚者或濕熱內余下利不止熱不退者或因大下後濕熱利不止而熱不退脈弱氣虛不可更下者或諸濕熱內余小便赤澀大便溏泄頻並少而急痛者必欲作痢也通宜黃連解毒湯以解之也或裡熱極甚而恐承氣不能退者或以下後而熱不退者或蓄熱內甚陽厥極深以至陽氣拂鬱不能營運於身表四肢以致通身清一作青冷痛甚不堪項背拘急目赤睛疼昏眩恍惚咽乾或痛熛渴虛汗嘔吐下利腹滿實痛煩冤悶亂喘急鄭聲郁鬱滯不通鄭音聲連濁邪惡而不清雅也此乃熱勢過極而語音濁亂不能清利也俗反妄傳以為寒極陰毒誤之甚矣脈須疾數以其極熱蓄甚而脈道不利及致脈沉細而欲絶俗未明其造化之理而反謂傳為寒極陰毒者或始得之陽熱暴甚而便有此證候者夫辨傷寒陰陽之異證者是以邪熱在表腑病為陽邪熱在裡而臟病為陰也俗乃妄言寒熱陰陽之異證者誤之久矣且素問傷寒直云熱病誠非寒也其三篇名曰熱論刺熱篇評熱病篇及逐篇明言為熱竟無寒理兼素問及靈樞諸篇運氣造化之理推之則明為熱病誠非寒也寒病固有夫非汗病之謂也且造化為汗液之氣者乃陽熱之氣所為非陰寒之所能也以觀萬物熱極而出液明可知矣經曰夫熱病皆傷寒之類也又曰人之傷於寒也則為熱病然既身內有陰寒者止為雜病終莫能為汗病也況病法曰身熱為熱在表飲水為熱在裡其傷寒汗病本末身涼不渴小便不黃脈不數者未之有也雖仲景有四逆薑附之類熱藥是以治其本里和誤以寒藥下之太早表熱未入於裡而寒下利不止及或表熱裡寒而自利者急以四逆湯攻裡利止里和急以解於表也故仲景四逆湯證後復有承氣下熱之說也由是觀之傷寒汗病經直言熱病而不言其有寒無疑也經言三陰證者為邪熱在臟在裡以臟與里為陰也宜下熱者也夫傷寒陰陽之別者但非表熱當汗而下之則死裡熱當下而汗之亦死故仲景曰桂枝下咽陽盛即斃承氣入胃陰實即亡死生之要在乎須臾視身之盡不暇計日此陰陽虛實之交錯其候至微發汗吐下之相反其禍至速而醫術淺短者懵然不知病源為始乃誤使病者殞沒然則止謂邪熱在表則汗之邪熱在裡則下之熱在上則吐之熱在下則泄之邪熱半在表半在裡則和解之豈分寒熱陰陽之虛實與陰陽汗病之證耶況朱奉議自言陰毒脈疾至七至八至以上疾不可數者陰毒已深也夫既云疾至八至以上疾不可數者正是陽熱極深之脈也豈是陰寒歟凡世俗所謂陰毒諸證以素問造化驗之皆陽熱亢極之證但蓄熱極深在內而身表有似陰寒也經云亢則害承乃制言五行之道實甚過極則反似克其己者是為兼化如萬物熱極反出水液以火鍊金熱極反似水是以火極而似水之化也五行皆然故肝熱甚則出淚心熱甚則出汗脾熱甚則出涎肺熱甚則出涕腎熱甚則出唾今傷寒為作汗之病氣者乃陽極怫鬱而否極復泰即熱氣蒸蒸而為汗出也如天時陽熱亢旱否極而泰則復為雨也故欲雨則乃鬱熱晴霽則天反涼人涼則病愈熱在病在故病寒者自是寒病非此汗病之氣也雖寒屬陰水而天地陰陽氣液相生之道則寒之化不能更生陰水也故古聖曰陽中生陰陰中生陽氣中生液液中生氣又曰積液生氣積氣生液又經曰氣和而生猶液然氣為陽物故萬物之水液皆生於陽熱之氣如天氣陽熱極甚則萬物濕潤而冬寒萬物乾燥由是言之既為作汗之病氣本熱非寒明矣故經又曰凡傷寒而成溫病者先夏至日為溫病後夏至日為暑病暑與其汗皆出止言邪熱隨汗皆出盡而愈也又經曰飲食飽甚汗出於胃驚而奪精汗出於心負重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾此皆動亂勞苦而致陽熱以為汗出豈可反言作汗之病以為陰寒耶今之俗醫不明陰陽變化之道而妄取陽主於生陰主於死而欲養於陽熱者殊不知此言自生之後以顯為陽陽中生陰故生者死之道也既死之後以隱為陰陰中生陽故死者生之道也此古人之論道乃死生有無動靜隱顯之陰陽非言寒熱之陰陽也俗又妄言仙經云純陽升而為仙純陽死而為鬼因以養陽熱者亦不知此以陽主虛無而言神為陽陰主形體而言形為陰言善養生者調順陽陰煉就陽神超升棄其陰體即純陽之神乃為仙也不明道者寒熱不調以致陰陽勝負耗絶陽神惟存陰殼則遊魂冥冥非鬼何哉此則修養家言形神之陰陽而非醫家寒熱之陰陽也俗又妄謂周易以陽為尊為美為善為剛為清為正而陰邪反之因以但欲養於陽熱者此又不知易象言陰陽體用之道以為教非言一身寒熱之陰陽也故陽健唱命而陰順和之陰順和之則陰陽和平而同歸善道非以乾陽特為熱也且夫子云乾為天為圓為君為父為玉為金為寒為冰然則乾之純陽豈謂熱耶此亦非特取寒冰為陽是取寒冰之徑健整肅清剛為乾健之象耳夫寒熱之卦坎為中男乃少陽之卦即寒冰也離為中女乃少陰之卦即火熱也坎離水火為夫婦而易以陽剛坎水寒者為夫而陰柔離火熱者為婦亦非以熱為陽剛而寒為陰柔也故易言陰陽者但以明其物象而非素問論病寒熱陰陽之氣也設云乾為寒者本非取乾陽為寒但取寒之徑栗清整像乾之道也俗又妄言人生則身溫而死則身冷及病雖身熱未至於死將死者必熱反變寒而後死也因雲陽則生陰則死以此專欲養於陽熱殊不知一身之內寒暑燥濕風火六氣渾而為一雨停則和平一興一衰病以生也夫和平之常者溫涼得所適當其陽和之氣如俗云人體溫和是也然冬寒而人腠理閉密則身當溫和夏熱則腠理開通而多汗出則身當微涼相反者病過與不及亦病其中臟腑陰分以為根本則固守陽和之氣但當溫和乃為和平唯臟腑之氣各隨五行休囚旺相死之時位而微有虛實不一也此之虛實乃自然之道而不為病者然冬腎水陰至而寒復以天氣寒則腠理閉密而陽氣收藏固守於內則適當其平而以能內外之寒夏心火陽旺而熱復以天氣熱則膚腠開泄而陽熱散越於外適當其平而以能內外之熱萬物皆然此陰陽否泰大道造化之理蓋莫大乎此也然雖秋冬痞閉此以其肺腎陰王而得其所故康強省病而病亦輕微也春夏開泰以其肝心陽王故胠音區弱多病而病熱怫鬱則陽氣散越故病甚而多死亡及夫地理方位高下四時寒熱溫涼安危壽夭病同故經曰陰精所奉人多壽陽精所奉其人夭又仙經西山記言平人四時嘗有唏謂三焦相火無不足八節不得吹謂腎臟陰難得實然則豈可不明陰陽虛實但欲養於陽熱耶凡病致死者陽和氣既不存則止為陰濕形體而已非冷何哉俗未知熱甚則熱蓄於內而陽熱不能營運於四肢身表故四肢逆冷以致身冷脈細而微則死蓄熱甚者氣血不通而身面俱青此則蓄熱之深也所以仲景言傷寒熱極失下則厥厥深者熱亦深而厥微者熱亦微如此則熱極而死者莫不身冷脈微而以致於絶也俗未明其然直反妄曰陽在則生陽去則死又曰陽熱變為陰寒則死因以但欲養其陽熱而反致殘陰暴絶則陽氣後竭而死不為少也俗醫未深明造化又以妄為傷寒得之勢惡陽勢暴甚而便蓄熱以深身冷厥逆手足無復溫和者直以為寒極而為陰厥以對陽厥及表裡熱勢俱甚而不蓄熱於內者以為陽毒以配陰毒分為寒熱陰陽之異證曾不知傷寒汗病便是熱病實無陰毒陰厥者也嗚呼病本熱甚熱蘊於裡則陽氣陷下以致厥逆身冷或青而脈微乃妄以寒極而內外急救其陽而反招其暴害因以妄言必死之證間或強實之人素本不衰及熱鬱怫結況衰微者偶中辛甘熱藥發散而腠理氣通怫熱以隨汗泄而愈者遂以為必死之病而救之以活反恨往之死者救助其陽之不及因以互相議論但見蓄熱內結厥逆者或未厥者早以溫之無用寒涼恐成陰毒陰證而死俗醫治傷寒誤人多者無過於此後學之士但以素問運氣自然造化之理原其標本則明可見焉且以依法救人慎勿惑於衆人之言故經曰謹熟陰陽無與衆謀又曰知逆與從正行無問此其道也或兩感勢甚者通宜解毒加大承氣湯下之熱不退者宜再下之然雖古人皆云三下之熱未退即死矣亦有按法以下四五次利一二行熱方退而得活者免致不下退其熱而必死也下後熱稍退而未愈者黃連解毒湯調之或微熱未除者涼膈散調之或失下熱極以致身冷脈微而昏冒將死者急下之則殘陰暴絶而死蓋陽氣後竭而然也不下亦死宜涼膈散或黃連解毒湯養陰退陽蓄熱漸以宣散則心胸復暖脈漸以生至於脈復而有力方可以三一承氣湯下之或解毒加大承氣湯尤良下後微熱不解涼膈散調之愈後常宜服愈熱之藥忌發熱諸物傷寒表證夫傷寒之候頭項痛腰脊強身體拘急表熱惡寒不煩躁無自汗或頭面目痛肌熱鼻乾或胸滿而喘手足指末微厥脈浮數而緊者邪熱在表皆麻黃湯發汗之證也或天水散之類甚佳無使藥不中效而益加害也益元散一名天水散一名太白散治身熱嘔吐泄瀉腸澼下痢赤白治淋閉癃閉疼痛利小腑偏主石淋蕩胸中積聚寒熱大益精氣通九竅六腑津液去留結消蓄水止渴利中除煩熱心燥治腹脹痛悶補益五臟大養脾腎之氣此腎水之臟非胃土之腑也理內傷陰痿安魂定魄補五勞七傷一切虛損主癇瘛驚悸健忘止煩滿短氣臟傷咳嗽療飲食不下肌肉疼痛治口瘡牙齒疳蝕明耳目壯筋骨通經脈和氣血消水穀保真元解百藥酒食邪熱毒耐勞役飢渴寒熱闢中外諸邪所傷久服強志輕身駐顏益壽及解中暑傷寒疫癘飢飽勞損憂愁思慮恚怒驚恐傳染並汗後遺熱勞復諸疾兼解兩感傷寒能遍身結滯宣通和氣而愈及婦人下乳催生併産後損液血虛陰虛熱甚一切諸證並宜服之兼愈吹乳乳發或已覺吹乳乳癰頻服即愈乃神驗之仙藥也石淋服金石熱藥結為砂石自小便中出痛不可忍傷風表證一曰中風夫傷風之候頭痛項強股節煩疼或目疼肌熱乾嘔鼻鳴手足溫自汗出惡風寒脈陽浮而緩陰浮而弱也關前曰陽關後曰陰此為邪熱在表皆桂枝湯解肌之證也或汗出憎風而加項背強痛者宜桂枝湯加葛根湯也反無汗者宜葛根湯也雖已服桂枝反煩不解而無里證者先刺風池風府卻與服之或服桂枝大汗出脈浮而洪大再宜服之發汗後半日許復熱煩脈浮數者再宜桂枝湯也當汗而反下之不成結胸而但下利清穀不化表證尚在者表熱裡寒也此言承氣寒藥下之者也或誤用巴豆熱藥下之而協熱利不止者或表裡皆熱自利或嘔者皆宜五苓散止利兼解表也急以四逆湯溫里利止里和急以桂枝湯解表或表熱里和下利同法或陽明病脈浮遲汗出微惡寒或太陰病腹滿而脈浮者並宜桂枝湯也脈反沉實者大承氣湯下之或下之早而心下痞汗出惡寒脈浮者表未解也先桂枝湯以解表已而以下血也宜桃仁承氣湯或抵當丸攻之俱中風寒頭項痛肢疼手足溫中風也反無汗惡寒脈浮緊者傷寒也或頭項痛腰脊強身拘急指末微厥不自汗為傷寒也反煩躁而脈緩者為傷風也風則傷衛而寒則傷榮萬物必以陰求陽陽求陰陰陽相應則為和平故榮者陰氣也寒加之則傷耳故又曰寒傷血血亦陰也衛陽氣也風亦陽也故風加之則傷耳故曰熱傷氣氣為陽也經言陰寒主於閉藏而陽熱主於開泄故寒傷榮則腠理閉密拂熱內作燥熱而無汗故脈數浮而緊也風傷衛則腠理開泄而自汗也故脈浮而緩以邪熱泄越故脈不能實陽明主於肌肉故自汗多而脈反遲也熱乃陽中之至陽故傷熱氣則大汗自出病雖為熱脈不能實而虛弱也然拂熱痞閉無汗者故當病也其汗泄通泰而亦病者蓋泰極則否也夫人氣和而為汗如天地氣和而為雨過多則潦久不雨則旱有無多少貴乎應時興衰失常則災害至矣萬事皆然榮衛俱傷則表裡熱甚也宜大青龍湯小青龍湯治傷寒表未罷心下有水氣表雖未罷而已有熱入於裡怫鬱於胃則飲食水液不能傳化宣行蓄積不散而為此非裡熱大實煩渴引飲過多停積而為病者乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者水不能浸潤宣散滋潤腸胃臟腑故熱而渴或噎或喘或小便不利少腹滿而喘也水液不能宣行則濕熱盛於腸胃故或利也小柴胡湯治傷寒中風其病半在表半在裡脈在肌肉不沉不浮筋脈拘急身體疼痛寒熱往來惡寒為表熱發熱為裡熱寒熱往來者邪熱半在表半在裡也進退不已而言無常也或嘔或咳胸脅痞滿硬痛下之前後無問日數及汗後餘熱不解或無問傷寒雜病蒸熱作發並兩感可和解者並宜服之涼膈散一名連翹飲子治傷寒表不解半入於裡下證未全或復未愈者或燥熱怫結於內而煩心懊憹不得眠者及無問傷寒雜病大人小兒臟腑積熱煩躁多渴面熱頭昏唇焦咽躁舌腫喉痹目赤鼻衄頷頰結硬口舌生瘡痰實不利咳唾稠黏睡臥不安譫語狂妄腸胃濕燥便尿悶結一切風熱壅滯風眩瘡癬及傷寒陽明胃熱發斑下證未全者或誤服暖藥過多為諸熱證並酒甚熱毒兼小兒癍疹痘瘡未出及驚風積熱傷寒不能辨別者或熱甚痘瘡已出未快者或熱極黑陷將死者小兒疹痘未出誤以熱藥發汗致使陽熱轉甚則重密出不快多致黑陷而死因以世俗多癍疹不敢服藥以誤小兒諸病多矣亦不知古人所留涼瀉之藥通治風驚積熱傷寒熱病縱誤是癍瘡亦使熱勢稍退而稀少出快早得痊安也若用此最為妙也閻孝忠集小兒方論未達錢氏本意不明造化之理反妄言疹病黑陷為寒及曰凡癍疹始終不可服涼瀉之藥後人因之反致熱甚黑陷而死者不可勝計也閻公豈不詳自所編錢氏方治癍疹黑陷用牛李膏及百祥丸凡寒藥下之而多得痊愈者而不救則必死然則痘疹為熱病豈不明哉況經曰諸痛癢瘡瘍皆屬於心及夫癍瘡黑陷無不腹滿喘喝嘶聲而小便赤澀不通豈不是熱極乎況癍疹本因熱而生病勢轉甚也豈能反為寒者也並兩感諸證三陰三陽雙傳諸證並宜服之或傷寒熱極將死陰氣衰殘則不宜下下之則陰氣暴絶陽氣後竭而死矣惟宜養陰退陽以至脈復而有力而後以三一承氣湯微下之下後未愈者更以涼膈散調之雖愈後猶宜少少服之庶邪熱不致再作也白虎湯治傷風自汗桂枝證表未解半入里可以和解者脈在肌肉而不可下者也或中暑自汗脈虛弱者熱傷氣而反自汗大出故脈不能自實而反虛弱或傷寒自汗脈滑數而實表裡俱熱脈沉浮皆得有力而數身熱頭痛煩渴腹滿小便赤黃也或三陽合病言太陽少陽陽明合受其為病之熱氣腹滿身重難以轉側口燥面垢譫語遺尿如誤發汗則譫語益甚下之則便額上出汗後必發黃或厥逆自汗者是謂熱越言自汗散越也如或裡熱而脈厥者或下證未全者兼和解兩感傷寒此方最解頭痛並止自汗無問中暑傷寒風熱雜病及傳染時疫本非外傷風寒脈便不浮而自汗頭痛欲作汗病者並宜服之無問四時但隨證而用之他藥仿此五苓散治中暑並傷寒大發汗後胃中干煩躁不得眠脈浮小便不利後熱煩渴及表裡俱熱飲水反吐名曰水逆或攻痞不解或口乾煩渴小便不利或痞尚在而利不止者或當汗而反下之利遂不止脈浮表不解自利或小便不利者凡用五苓散證無問脈之沉浮或一切留飲不散以此散水止渴並解兩感太陽少陰俱病經言六經病證者是也或一切吐瀉霍亂無問寒熱及小兒瀉驚風無問急慢皆宜服之桂苓甘露散一名桂苓白朮散治傷寒中風冒暑飲食內外一切所傷傳受濕熱內甚或頭痛口乾或吐瀉煩渴或小便赤澀大便急痛或瀉利間作並一切濕熱霍亂吐瀉轉筋急痛腹滿痛悶或中外諸邪所傷而並吐瀉者濕熱之時尤宜服之並治小兒驚風白朮散治傷寒雜病一切吐瀉煩渴霍亂虛損及氣弱久虛保養衰老兼治酒膈嘔噦四逆湯治傷寒表熱未入於誤以寒藥下之太早其表熱本未入因而裡寒下利不止或表熱裡寒自利不止者急以四逆溫里脈浮不渴小便清白不溫完穀不化者是也或辨便溺之色者須更審其飲食萬物之色也或下後協熱利不止者咽乾煩渴也謹不宜溫也宜五苓之類散其濕熱也惟裡寒者可以溫之止其寒瀉利止里和表證尚在者急以桂枝湯解表也或雜病寒飲嘔吐者或寒濕泄瀉者然雖雜病若濕熱吐瀉者不宜此方雖亦有濕熱痞閉之微者誤中辛熱開發而效甚者強劫不開則怫熱病轉加也惟裡寒可通用四逆湯也茯苓半夏湯治傷寒雜病一切嘔吐或喘咳頭痛者半夏橘皮湯治傷寒雜病嘔噦風眩痰逆咳喘頭痛並風熱反胃吐食諸證黃連解毒湯治傷寒雜病並酒燥熱毒煩悶乾嘔口燥呻吟錯語不得眠凡一切大熱狂躁喘滿及陰厥極甚蓄熱內深俗妄傳為陰毒者見前辨表熱太甚頭項肢體痛不可忍脈洪躁里有微熱不可汗者或濕熱內甚或欲作痢者大便溏數而少腹急痛小便赤或澀者必欲作痢也或已利熱勢甚者並服本方及下之前後寒涼諸藥不能退其熱勢之甚者兩感諸證同法兩感者一日太陽與少陰俱病則頭痛口乾而煩滿二日陽明與太陰俱病則耳聾囊縮而厥通宜此方以退表裡諸熱朱氏不明此皆熱證妄言前三日真為病寒以四逆湯急溫里而後以桂枝湯急解表大誤人也此二方皆不可用但隨表與里熱勢微甚以退其熱使無致熱極而死者是也若勢甚宜下者加大承氣湯下之及夫經言此三日傳受亦大略之法也大抵宜隨證以施治亦不必拘也或勢甚欲下慮不能退其熱者加大承氣湯下之或熱結極深而諸藥數下畢竟不能利不救必死者此法更下甘逐末一錢以下之吐利同效或但自熱結胸中心胸高起腹雖不滿而但喘急悶結譫妄昏冒關脈沉數而緊者尤宜此法急以下之吐愈佳瓜蒂散治表證罷邪熱入里結於胸中煩滿而飢不能食微厥而脈乍緊者宜以吐之諸可下證大柴胡湯諸服小柴胡湯證後病不解表裡熱勢更甚而心下急郁微煩或發熱汗出不解下心痞硬嘔吐下利以上屬太陽或陽明病多汗或少陰病下利清水心下痛而口乾或太陰病腹滿而痛或無表裡證但發熱七八日雖脈浮而數或脈在肌肉實數而滑者及兩感諸證可微下者雙除表裡三熱者並宜此劑大承氣湯治大小二柴胡證後表裡俱熱病勢更甚者或陽明脈遲汗出不惡寒陽明主肌肉熱甚自汗多故脈不能數而反遲也裡熱更甚故不惡寒而反惡熱也身重短氣腹滿而喘有時潮熱惡寒為表熱當汗而不可下發熱為裡熱當下而不可汗或手足心濈然汗出者濈阻立切和也今言唯手心足心氣似和然而汗出也此大便已硬也或吐下後不解不大便五六日至十餘日日晡潮熱不惡寒獨語如見鬼狀劇者發則不識人循衣摸床惕然而安微喘此陽明裡熱極甚也足陽明胃經外為肌肉十二經之長內為五臟之本六腑之大源故陽明胃病雖為腑病其脈沉數而實者皆當下之也然腸胃熱甚則大便自黃赤變褐以至於黑者難治也凡潮熱譫語不能食者腸中已有燥糞能食者但硬耳舊云胸中有燥糞是寄手陽明證在足陽明也燥糞實非在於胸耳或陽明病下之後心胸燥熱而懊憹煩躁者亡液故也或煩熱汗出則解復如瘧狀日晡發熱而脈沉實者宜以下也脈浮虛者桂枝湯主之或六七日不大便目不了了睛不和無表裡證大便難身微熱者或小便不利大便乍難乍易時發微熱喘冒不能臥者有燥糞也或三部脈皆平心下硬或脈大而緊者或下利脈滑而數者或下利脈遲而滑者遲由熱泄不止而致之實非寒也或少陽病二三日口燥咽乾者或自利清水色純青心下痞痛口燥者皆濕相搏於腸胃之內而或下利也然熱則鬱結濕則痞閉故水液不結及浸潤於外則腸胃之外燥熱太甚而煩渴不止腸胃之內濕熱瀉也本因熱鬱而留飲以成濕也或諸腹滿實痛煩渴譫妄脈實數而沉者無問日數並宜大承氣下之或裡熱燥甚腸胃怫鬱留飲不散煩渴不止胸腹高起痛不可忍但嘔冷液大渴反不能飲飲亦不能止其渴喘急悶亂但欲死者熱服下咽立止其渴有若無病之人須臾大汗而愈至此往往多未利而汗出亦有藥力但隨汗之宣通則不利而愈者也小承氣湯治傷寒日深恐有燥屎欲知之法少服小承氣湯腹中轉矢氣謂動轉失泄之氣也有燥屎也乃可攻之不轉矢氣者必初硬後溏未可攻之攻之則腹滿不能食也欲飲水而噦其後發熱者大便復硬而少也宜小承氣和之若腹大滿不通與小承氣湯微和胃氣勿大泄也或陽明多汗津液外出腸胃燥熱大便必硬而譫語也或譫語脈滑疾或發汗吐下後微煩小便大便因硬者或下利譫語者多復有燥屎也通宜小承氣湯下之或得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食少少與小承氣湯和之令小安調胃承氣湯治諸發汗和解吐後不惡寒但發熱而或蒸蒸然者或日深心下溫溫欲吐而胸中滿痛大便反溏腹微滿鬱郁微煩先此時自極吐下者先蘇佃切先此時者先此時之前已曾自極吐下而復此證也或日深裡熱譫語法當承氣下之誤以銀粉巴豆燥熱大毒丸藥下之以致真陰損虛則邪熱轉甚甚者為邪衰者為正因而協熱下利不止脈反調和也協胡劫切和也合也今言病本為熱而又與辛熱大毒丸藥下之則兩熱協和相合而熱甚下利不止也下利脈當微厥而其熱藥攻之故脈反適當其調和也言有熱利不止而脈反平或滑實大而緊者也及或表病里和而下之太早表熱乘虛入里而或不成結胸但為熱利不止心下滿硬或痛煩渴咽乾脈滑數而或實者或諸腹滿實痛者或煩渴譫妄者小便赤澀大便或硬或熱泄脈滑實而緊甚也並宜調胃承氣湯下之三一承氣湯通治大小調胃三承氣湯證大法表證罷熱傳於裡則宜下之熱除即愈宜調胃承氣也此失下熱極則危而死矣表病里和則當汗之熱泄身涼即愈若反下之則表熱乘虛入里而成結胸之類諸病也或表熱半傳於裡半尚在表則不可汗下宜小柴胡之類和解之也或表裡兩證熱勢俱甚而和解不能已者雖邪熱半在裡半在表法當寒熱往來以其表裡熱勢俱甚故亦不惡寒而俱惡熱也宜大柴胡湯微下之通除表裡之熱也或誤用調胃承氣則只能攻裡不能除其表熱或用小承氣多攻裡少除表則表熱乘虛入里皆能為害也其大柴胡證勢更甚者宜大承氣下之設未全愈而或有表之微淺邪熱入之於里以其厚朴枳實之類善開結滯而不能成其結胸之類諸病也故活人書言攻裡之藥調胃承氣最緊小承氣次之大承氣又次之大柴胡最緩慢故表證未罷而為裡熱已甚須可緩下者先大柴胡次大承氣亦可通也若論善開鬱結怫熱峻疾得利而效至大設未痊除而亦難再鬱結者大承氣也故活人書復言大承氣最緊小承氣次之調胃承氣又次之大柴胡最慢也是以可急下之者宜大承氣也故雖大柴亦可通用而復無急下之證也或可微下及微和胃氣者小承氣湯調胃承氣為後先之次由是觀之而緩下急下善開發而難鬱結可通用者大承氣湯最為妙也故今加甘草名曰三一承氣湯通治三承氣湯證於效甚速而無加害也然以其甘草味能緩其急結溫中潤燥而又善以和合諸藥而能成功故本草云國老子也是以大承氣湯得其甘草則尤妙也然此一方是三承氣等湯也或無問傷寒雜病內外一切所傷日數遠近但以腹滿咽乾煩渴譫妄心下按之硬痛或熱甚喘咳悶亂驚悸癲狂目疾口瘡舌腫喉痹癰腫瘡瘍或傷寒陽明胸熱發斑脈沉須可下者及小兒驚風熱極潮搐涎喘昏塞並斑疹痘瘡熱極黑陷小便不通腹滿喘急將欲死者或斑疹後熱毒不退久不作痂者痂音茄瘡痂也或作斑癰瘡癬久不已者或怫熱內成痃癖堅積腹滿而喘黃瘦潮熱驚風熱積及大人小兒久新瘧疾暴卒心痛風痰酒膈腸垢積滯久壅風暴傷酒食煩心悶亂脈數沉實或腎水陰虛陽熱暴甚而僵仆卒中或一切暴喑不語失喑或蓄熱內甚陽厥極深脈反沉細而欲絶者或表之沖和正氣與邪氣並之於里則裡熱亢甚而陽極似陰反為寒戰脈微欲絶者或風熱燥甚客於下焦而大小便澀滯或不通者風木能勝濕土火熱能耗水液因而成燥燥則緊斂堅結滯不通故風熱燥甚於下焦則燥糞結硬腹又緊斂者其燥糞不能相離並膀胱燥郁不能滲泄故不通也慎不可用銀粉巴豆大毒燥熱丸藥下之反生燥熱而耗其陰液也故傷寒下熱古皆禁之最宜三一承氣湯兼用下取法或産婦胎死不下者風熱燥濕緊斂則産戶不得自然開通也其證逆脈弦數而澀面赤或青或變五色腹滿急痛喘閉胎已不動者是也手足溫而脈滑者止為難産但宜滑胎催生慎不可下也及兩感表裡熱甚欲可下者並宜三一承氣大承氣加甘草是也或下食積及急攻結滯者調下輕粉一字滯下目疾口瘡咽喉瘡瘍斑疹加涼膈散下死胎加益元散十棗湯治太陽中風下痢嘔逆表證罷乾嘔短氣不惡寒漐漐汗出發作有時頭痛心下痞硬滿引脅下痛者兼下水腫腹脹並酒積食積一切腸垢積滯痃癖堅積或蓄熱心腹暴痛或瘧氣久不已者或表之正氣與邪熱並甚於里熱極似陰而反寒戰表氣入里而陽厥極深故脈微而欲絶也並風熱燥甚結於下焦大便不通或實熱腰痛者及小兒熱結乳癖積熱作發驚風潮搐斑疹熱毒不能了絶者宜以下之瘀血下證瘀於預切積也又音於桃仁承氣湯治太陽病不解而循經熱結在膀胱其人如狂血自下者愈表不解者先以桂枝湯解表已而但小腹急結者乃以下之或言少腹者誤也臍上為腹腹下為小腹小腹兩旁謂之少腹凡下皆作小腹也抵當丸治傷寒裡熱少腹滿當小便不利今反利者有蓄血也宜以下之抵當湯治太陽日深表證仍在循經而熱蓄下焦脈微而沉不結胸而發狂者熱在下焦少腹當硬滿小便自利也血下乃愈宜以攻之或太陽病身黃脈沉者循經而蓄熱下焦也少腹硬小便不利為無血小便自利如狂者瘀血證也或陽明蓄熱內甚而喜忘喜許記切或狂大便雖硬而反易不難也其色黑者有蓄血也或無表裡證但發熱日深脈雖浮者亦可下之或已下後脈數胸熱消穀善飢數日不大便者有瘀血也並宜抵當湯下之發黃茵陳湯治陽明裡熱極甚煩渴熱鬱留飲不散以致濕熱相搏而身體發黃或言寒熱相搏而發黃者誤也則如萬物濕熱甚則自生黃色苔也或本傷寒熱極失下或誤汗之溫之灸之尉之或誤服銀粉巴豆大毒熱藥下之反以亡液損其陰氣邪熱轉甚或下之太早熱入里不成結胸但以發黃者或失寒涼調治或熱勢本惡雖按法治之而不能退其熱勢之甚者或下後熱勢不退皆能發於黃也大抵本因熱鬱極甚留飲不散濕熱相搏而黃也其候但頭汗出身無汗劑頸而還小便不利渴飲水漿者身必發黃也怫熱在表燥而無汗濕熱在裡氣甚不能散越於外則濕熱之氣鬱甚而上行以至頭面陽極之分則濕熱蒸為微汗而頸下無汗然濕熱不能自然宣通散越於周身故濕熱鬱之極甚而面目遍身發黃也故白虎湯證遍身自汗出者仲景謂之散越不發於黃也小便不利者濕熱發黃之證也或小便自利或狂或大便黑者瘀血證也發黃亦有譫妄者本所不言以黃證未明故不須言也宜茵陳湯調下五苓散以利小便退其濕熱也已黃者茵陳湯利大小便也結胸汗下之後不大便五六日舌乾而渴日晡小有潮熱從心至少腹硬滿而痛不可近脈尚沉緊滑數或但關脈沉緊者通宜大陷胸湯或凡下之或脈浮者表未罷也不可下之下之死宜小陷胸湯及小柴胡之類和解罷者方可下之或結胸雖脈浮而裡熱勢惡須可下者宜三一承氣湯一服分作三次約三時許服訖得利甚良雖未利稍減脈必漸沉病微者只用三一承氣湯半服按而下之裡熱甚者以大陷胸湯大半服而下之謂有前藥之力也然雖二方中甘遂反甘草或勢惡者故意以甘草擊甘遂使開發峻疾而為效速矣故世方及活人書雙圓子亦直用甘草甘遂也或但結胸別無大段熱證但頭微汗出脈沉潛者水結胸也通宜大陷胸湯小結胸者心下按之而痛脈浮而滑別無大段熱證也此亦下之早而熱結心胸也但以熱微於大結構而甚於痞但熱之微甚也俗未明之又以妄謂但結胸無大熱證為寒實結胸殊不知素問明言熱病而實非寒也及夫臟結陰結陽結者經以熱結於腑而腑為陽是名陽結熱結於臟而臟為陰是名陰結一名臟結也然熱結於腑則微而淺故病厥微而易治熱結於臟則深而當病甚故厥深而難治矣或臟結蓄熱極深而至身冷脈微而欲絶者表之熱證反不見也俗未知本熱極而致反言陰寒臟結本亦病熱極俗又妄加熱藥反絶殘陰而暴死十無一生因以世傳臟結便為死病也若以素問六氣脈證標本驗之則明可見其熱證也留飲不散而成頭汗而脈沉潛反附於骨者積飲以成水結胸及水結胸者通宜小陷胸湯也痞傷寒表裡俱熱下證未全法當和解誤下之早則成痞心下痞滿而不痛按之軟虛也然須里之陰分已受熱入而為病是謂病發於陰也或熱微下證未全則不任轉瀉誤下之早則里之微熱除去之外反為熱入所損虛而表熱故虛入里雖不能成結胸亦作痞也俗醫妄謂陰寒之作發下之早而成痞者誤也然病既已為陰寒何得更言發於陰也故此之邪熱病之表於陽分而里和未有邪熱反以下之太早則里乃極虛而表之全熱大入於裡此失之至大故成結胸而病熱勢惡也痞則誤之小故為熱勢輕微也小結胸者微於大結胸而甚於痞也但分誤之大小熱之微甚非謂痞為寒也故仲景本攻痞多用大黃黃連黃芩寒藥耳後或以加附子乾薑之類者是以辛熱佐其寒藥欲令開發痞之怫熱結滯也非攻寒耳故攻痞下開者後當陷胸湯寒藥下其熱也或當用大柴胡大承氣雙下表里則表熱入里而亦成痞也或無問可下不可下而誤用銀粉巴豆燥熱大毒丸藥下之反以損陰亡液以使怫熱太甚亦或成痞或為諸熱變證各以本論詳之痞脈浮而尚惡寒者表未解也當先桂枝湯解表已而後攻痞也故只服五苓散便雙散表裡甚良或痞惡寒而汗出者或痞而煩渴小便不利者或痞而留飲濕熱下痢者或已成痞而因藥利尚不止以其痞滿誤更下之其痞轉甚嘔噦下利心煩躁者無問痞脈沉浮並宜煎生薑湯生薑一味調下五苓散每服四五錢頻服或痞不已則後亦實熱煩滿或譫妄脈沉無他證者宜大黃黃連瀉心湯或用前方小陷胸亦得懊憹懊憹者煩心熱燥悶亂不寧也甚者似中巴豆草烏頭之類毒藥之狀也梔子湯治懊憹煩心反復顛倒不得眠者燥熱怫鬱於內而氣不能宣通也經曰血氣者人之神由榮衛血氣運行則神在乎其中也然神行於表則榮衛流注於經謂之行陽令人寤猶天之日出為晝也神行於里則五臟相生而順傳謂之行陰令人寐故神識外無所用而惑神迷於內則復為夢也猶日入於夜其夫燥金主澀而濕土主滑夫燥濕之體必先因之於彼氣而後為其兼化也猶先大涼而物後燥及風勝濕熱耗其液而成燥體及熱太甚則萬物濕潤而出液者也由是表熱無燥者氣血運行通利而成癲狂走呼而力大者也燥熱病於外者氣血壅滯則痿弱而無力也故病內熱而無燥者津液潤澤氣血滑利則昏冒多睡也如洗心散寒藥言治多睡是也故小兒晝精健夜安寢由血液不衰也夫燥病於內者氣血澀滯則懊憹煩心不得眠也夫傷寒之燥熱者因於大發吐下或嘔吐瀉痢自汗過多或陽熱太甚損陰耗液亡液則血衰而成燥熱也或炙尉炙烙或誤服熱劑或誤因銀粉巴豆燥熱大毒丸藥下之反損陰亡液血衰則燥熱太甚多為此誤經曰目得血而能視耳得血而能聽手指得血而能操掌得血而能握足得血而能步髒得血而能液腑得血而能氣然則一身之至貴者莫過於血故陽熱雖甚而血液不衰則榮衛通利而為病微血液既衰以伐燥熱怫鬱則甚也且如酒熱方甚而血液未衰則氣血宣通而和暢因其酒熱損陰亡液以致血衰而酒漸以散之燥熱怫鬱而煩渴病於酒也而再飲後得平者氣液宣行而燥熱怫鬱後得散也或不受復者酒毒已甚燥熱不能散也亦猶世俗妄意以分陽毒微於陰毒者是謂內外燥熱太甚而血液不衰則氣血運行之太甚而為病者猶泰極失常以為陽毒也以血液衰竭燥熱太甚蓄之於內則陽氣不能營運於表故遍身青冷厥逆病危極將死者妄謂寒極陰毒也因以中外急救其陽而反招暴禍倘或病熱尚微而誤中素問言辛熱開發強劫之效因以妄矜己能以謂陰毒必死之證救之以活致使世俗愈感而惟恨救之不及誤人多矣殊不知但以退熱潤燥散結則氣液宣行而愈也故經曰腎苦燥急食辛以溫之開腠理致津液通氣脈也然氣通和即津液宣行也故經曰氣和而生津液相盛而神自生或胸滿結滯或頭微汗出劇煩者梔子湯主之或少氣者加甘草一錢或加嘔者及初誤以丸藥下之者加生薑半兩凡懊憹虛煩者皆用涼膈散甚佳及宜湯濯手足使心胸結熱宣散而已梔子厚朴湯治心煩腹滿坐臥不安
